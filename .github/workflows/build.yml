name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout with full history (needed for GitVersion)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup .NET SDK (version from global.json)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      # Cache NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Configure GitHub Packages NuGet source with credentials
      - name: Configure NuGet Credentials
        run: |
          dotnet nuget update source github \
            --username github \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore

      # Build (GitVersion.MsBuild sets version automatically)
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Extract version from GitVersion.MsBuild output
      - name: Extract Version
        id: version
        run: |
          SEMVER=$(jq -r '.SemVer' src/Awen/obj/gitversion.json)
          MAJORMINORPATCH=$(jq -r '.MajorMinorPatch' src/Awen/obj/gitversion.json)
          echo "semVer=$SEMVER" >> $GITHUB_OUTPUT
          echo "majorMinorPatch=$MAJORMINORPATCH" >> $GITHUB_OUTPUT
          echo "Version: $SEMVER (MajorMinorPatch: $MAJORMINORPATCH)"

      # Run unit tests
      - name: Unit Tests
        run: |
          dotnet test tests/Awen.Sdk.Tests/Awen.Sdk.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=sdk-tests.trx"

          dotnet test tests/Awen.Tests/Awen.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=awen-tests.trx"

      # Publish linux-x64
      - name: Publish linux-x64
        run: |
          dotnet publish src/Awen/Awen.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            --output ./publish/linux-x64 \
            /p:PublishSingleFile=true
          mv ./publish/linux-x64/Awen ./publish/linux-x64/awen-linux-x64

      # Publish win-x64
      - name: Publish win-x64
        run: |
          dotnet publish src/Awen/Awen.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained \
            --output ./publish/win-x64 \
            /p:PublishSingleFile=true
          mv ./publish/win-x64/Awen.exe ./publish/win-x64/awen-win-x64.exe

      # Publish osx-x64
      - name: Publish osx-x64
        run: |
          dotnet publish src/Awen/Awen.csproj \
            --configuration Release \
            --runtime osx-x64 \
            --self-contained \
            --output ./publish/osx-x64 \
            /p:PublishSingleFile=true
          mv ./publish/osx-x64/Awen ./publish/osx-x64/awen-osx-x64

      # Publish osx-arm64
      - name: Publish osx-arm64
        run: |
          dotnet publish src/Awen/Awen.csproj \
            --configuration Release \
            --runtime osx-arm64 \
            --self-contained \
            --output ./publish/osx-arm64 \
            /p:PublishSingleFile=true
          mv ./publish/osx-arm64/Awen ./publish/osx-arm64/awen-osx-arm64

      # Pack Awen.Sdk and Awen NuGet packages
      - name: Pack NuGet packages
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet pack src/Awen.Sdk/Awen.Sdk.csproj \
            --no-build \
            --configuration Release
          dotnet pack src/Awen/Awen.csproj \
            --no-build \
            --configuration Release

      # Create GitHub Release with binaries (main branch only)
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.majorMinorPatch }}
          name: v${{ steps.version.outputs.majorMinorPatch }}
          generate_release_notes: true
          files: |
            publish/linux-x64/awen-linux-x64
            publish/win-x64/awen-win-x64.exe
            publish/osx-x64/awen-osx-x64
            publish/osx-arm64/awen-osx-arm64

      # Publish NuGet packages
      - name: Publish NuGet packages
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet nuget push src/Awen.Sdk/bin/Release/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push src/Awen/bin/Release/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
