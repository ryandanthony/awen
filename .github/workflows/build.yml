name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout with full history (needed for GitVersion)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup .NET SDK (version from global.json)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      # Cache NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # GitVersion setup and execution
      - name: Install GitVersion
        run: dotnet tool install --global gitversion.tool

      - name: Determine Version
        id: gitversion
        run: |
          # Get JSON output and filter out INFO/WARN lines
          VERSION_JSON=$(dotnet-gitversion /output json 2>&1 | grep -v "INFO\|WARN" | tr -d '\n')
          echo "Version JSON: $VERSION_JSON"

          # Parse using jq if available, fallback to grep
          if command -v jq &> /dev/null; then
            SEMVER=$(echo "$VERSION_JSON" | jq -r '.SemVer')
            FULLSEMVER=$(echo "$VERSION_JSON" | jq -r '.FullSemVer')
          else
            SEMVER=$(echo "$VERSION_JSON" | grep -oP '"SemVer"\s*:\s*"\K[^"]+')
            FULLSEMVER=$(echo "$VERSION_JSON" | grep -oP '"FullSemVer"\s*:\s*"\K[^"]+')
          fi

          echo "semVer=$SEMVER" >> $GITHUB_OUTPUT
          echo "fullSemVer=$FULLSEMVER" >> $GITHUB_OUTPUT

      - name: Display Version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"

      # Configure GitHub Packages NuGet source with credentials
      - name: Configure NuGet Credentials
        run: |
          dotnet nuget update source github \
            --username github \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore

      # Build with version
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:Version=${{ steps.gitversion.outputs.semVer }}

      # Run unit tests
      - name: Unit Tests
        run: |
          dotnet test tests/Awen.Sdk.Tests/Awen.Sdk.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=sdk-tests.trx"

          dotnet test tests/Awen.Tests/Awen.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=awen-tests.trx"

      # Publish linux-x64
      - name: Publish linux-x64
        run: |
          dotnet publish src/Awen/Awen.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            --output ./publish/linux-x64 \
            /p:PublishSingleFile=true \
            /p:Version=${{ steps.gitversion.outputs.semVer }}

      # Publish win-x64
      - name: Publish win-x64
        run: |
          dotnet publish src/Awen/Awen.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained \
            --output ./publish/win-x64 \
            /p:PublishSingleFile=true \
            /p:Version=${{ steps.gitversion.outputs.semVer }}

      # Upload build artifacts with 7-day retention
      - name: Upload linux-x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: awen-linux-x64-${{ steps.gitversion.outputs.semVer }}
          path: publish/linux-x64/
          retention-days: 7

      - name: Upload win-x64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: awen-win-x64-${{ steps.gitversion.outputs.semVer }}
          path: publish/win-x64/
          retention-days: 7

      # Pack Awen.Sdk NuGet package
      - name: Pack Awen.Sdk
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet pack src/Awen.Sdk/Awen.Sdk.csproj \
            --no-build \
            --configuration Release \
            /p:PackageVersion=${{ steps.gitversion.outputs.semVer }}

      # Create GitHub Release with binaries (main branch only)
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          name: v${{ steps.gitversion.outputs.semVer }}
          generate_release_notes: true
          files: |
            publish/linux-x64/Awen
            publish/win-x64/Awen.exe

      # Publish Awen.Sdk to NuGet
      - name: Publish Awen.Sdk to NuGet
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet nuget push src/Awen.Sdk/bin/Release/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
